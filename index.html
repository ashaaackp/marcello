<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Universe</title>
    <style>
        body {
            /* Latar belakang putih gading hangat, super bersih dan elegan */
            background-color: #faf6f0; 
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* Warna teks merah marun gelap yang romantis */
            color: #5c0618; 
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #801326;
            font-weight: 300;
        }

        /* Container Hati */
        .heart-container {
            cursor: pointer;
            width: 110px;
            height: 110px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Hati SVG Utuh dengan warna Merah Velvet Crimson */
        .heart-svg {
            width: 100%;
            height: 100%;
            fill: #a71d31; 
            /* Memberikan efek bayangan lembut biar kelihatan premium */
            filter: drop-shadow(0 6px 12px rgba(167, 29, 49, 0.3));
            transition: fill 0.3s ease;
        }

        /* Efek hover: Hati berdenyut pelan dan warnanya sedikit lebih menyala */
        .heart-container:hover .heart-svg {
            animation: pulse 1.2s infinite;
            fill: #c71f37;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* Animasi pas diklik sebelum pindah halaman */
        .heart-container.clicked {
            animation: clickPop 0.4s forwards ease-in-out;
        }

        @keyframes clickPop {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.2); }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
    <!-- Mengambil font modern dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>

    <h1>HAY PACAR MANGU KU ❤️</h1>
    <p>Aku ada sesuatu buat kamu nihh, coba klik hatinya...</p>

    <!-- Tombol Hati Simetris & Elegan -->
    <div class="heart-container" onclick="sendToPage()">
        <svg class="heart-svg" viewBox="0 0 32 32">
            <path d="M16 28.5c-.5 0-1-.2-1.4-.6l-10.1-10c-3.1-3.1-3.1-8.1 0-11.2 1.5-1.5 3.5-2.3 5.6-2.3s4.1.8 5.6 2.3l.3.3.3-.3c1.5-1.5 3.5-2.3 5.6-2.3s4.1.8 5.6 2.3c3.1 3.1 3.1 8.1 0 11.2l-10.1 10c-.4.4-.9.6-1.4.6z"/>
        </svg>
    </div>

    <script>
        function sendToPage() {
            const heart = document.querySelector('.heart-container');
            heart.classList.add('clicked');

            // Jeda 0.4 detik biar efek animasinya selesai baru pindah halaman
            setTimeout(() => {
                window.location.href = "pg1.html";
            }, 400); 
        }
    </script>

</body>
</html>
